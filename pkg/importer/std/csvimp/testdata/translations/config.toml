[date]
col    = "Date"
format = "2006-01-02"

[account]
default = "Assets:Checking"

[payee]
col = "Payee"

[payee.map]
"AMZN MKTPL" = "Amazon"

[currency]
col     = "Cur"
default = "USD"

[currency.map]
"¥" = "JPY"
"$" = "USD"

[narration]
cols      = ["Desc"]
separator = " / "

[narration.map]
"ATM W/D" = "ATM withdrawal"

[[amount]]
col = "Amount"
