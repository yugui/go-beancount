[date]
col    = "Date"
format = "2006-01-02"

[account]
default = "Assets:Checking"

[payee]
col = "Payee"

[currency]
default = "USD"

[narration]
col = "Description"

[[amount]]
col    = "Amount"
negate = false

# Drop the trailing total row (Date column starts with "Total").
[[exclude]]
col   = "Date"
match = "^Total"

# Drop footnote rows that do not align to the data columns.
[[exclude]]
match = "^※"
