kind = "csv-sexp"
name = "headerless"
program = '''
(csv-import
  :columns (("Date" 0) ("Payee" 1) ("Description" 2) ("Amount" 3))
  (let* ((date (parse-date (column "Date") "2006-01-02"))
         (amt  (parse-amount (column "Amount"))))
    (emit-transaction
      :date date :amount amt :currency (const "USD")
      :account (const "Assets:Checking")
      :payee (column "Payee") :narration (column "Description"))))
'''
