kind = "csv-sexp"
name = "counteraccount"
program = '''
(csv-import
  (let* ((date (parse-date (column "Date") "2006-01-02"))
         (amt  (parse-amount (column "Amount")))
         (ctr  (or-else
                 (diag-as-warning
                   (map-value (column "Category")
                     (dict ("Food" "Expenses:Food") ("Rent" "Expenses:Housing:Rent"))
                     :strict "csvbase-unmapped-counter-account")
                   "csvbase-unmapped-counter-account")
                 (const "Expenses:Misc"))))
    (emit-transaction
      :date date :amount amt :currency (const "USD")
      :account (const "Assets:Checking")
      :counter ctr :narration (column "Memo"))))
'''
