kind = "csv-sexp"
name = "currencysuffix"
program = '''
(csv-import
  :number (number-format :thousands-sep ",")
  (let* ((date (parse-date (column "Date") "2006-01-02"))
         (amt  (parse-amount (column "Amount") :split-currency #t))
         (cur  (coalesce (currency-hint amt))))
    (emit-transaction
      :date date :amount amt :currency cur
      :account (const "Assets:Checking")
      :payee (column "Payee") :narration (column "Description"))))
'''
