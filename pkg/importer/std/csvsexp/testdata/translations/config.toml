kind = "csv-sexp"
name = "translations"
program = '''
(csv-import
  (let* ((date (parse-date (column "Date") "2006-01-02"))
         (amt  (parse-amount (column "Amount")))
         (cur  (coalesce
                 (map-value (trim (column "Cur"))
                   (dict ("¥" "JPY") ("$" "USD")) :verbatim)
                 (const "USD")))
         (narr (map-value (trim (column "Desc"))
                 (dict ("ATM W/D" "ATM withdrawal")) :verbatim))
         (pay  (map-value (column "Payee")
                 (dict ("AMZN MKTPL" "Amazon")) :verbatim)))
    (emit-transaction
      :date date :amount amt :currency cur
      :account (const "Assets:Checking")
      :payee pay :narration narr)))
'''
